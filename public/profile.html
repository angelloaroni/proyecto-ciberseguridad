<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falsoniac Bank — Mi perfil</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="wrapper" style="max-width:640px;">

  <nav class="topbar">
    <a class="brand" href="/dashboard">🏦 Falsoniac Bank</a>
    <div class="nav-links">
      <a href="/dashboard">Inicio</a>
      <a href="/logout">Cerrar sesión</a>
    </div>
  </nav>

  <div class="card">
    <h1 style="margin-bottom:18px;">Mi perfil</h1>

    <div id="profileInfo">
      <div class="profile-row"><span class="profile-key">Usuario</span><span class="profile-val" id="pUser">—</span></div>
      <div class="profile-row"><span class="profile-key">Email</span><span class="profile-val" id="pEmail">—</span></div>
      <div class="profile-row"><span class="profile-key">Teléfono</span><span class="profile-val" id="pPhone">—</span></div>
      <div class="profile-row"><span class="profile-key">Rol</span><span class="profile-val" id="pRole">—</span></div>
      <div class="profile-row"><span class="profile-key">Cuenta</span><span class="profile-val" id="pLabel">—</span></div>
      <div class="profile-row"><span class="profile-key">Saldo</span><span class="profile-val" id="pBalance">—</span></div>
      <div class="profile-row"><span class="profile-key">ID de cuenta</span><span class="profile-val" id="pId">—</span></div>
    </div>

    <hr style="margin:20px 0;border:none;border-top:1px solid #e2e8f0;"/>

    <!-- Cookie de sesión visible -->
    <!-- [VULN-MITM] La cookie de sesión viaja por HTTP sin TLS y es accesible vía JS porque httpOnly=false -->
    <h2 style="margin-bottom:10px;font-size:1rem;">Información de sesión</h2>
    <button class="btn btn-secondary btn-sm" onclick="checkSession()">Verificar sesión en servidor</button>
    <pre class="result-box" id="sessionResult"></pre>
  </div>

</div>
<script>
  // [VULN-IDOR] El perfil que se muestra depende únicamente del parámetro
  // ?id= en la URL. El servidor (/account?id=X) no valida que la cuenta
  // pertenezca al usuario autenticado, así que cambiar el id en la barra
  // de direcciones permite ver el perfil de cualquier otra cuenta.
  async function resolveMyAccountId() {
    const res = await fetch('/user-info');
    if (!res.ok) { window.location.href = '/login'; return null; }
    const data = await res.json();
    if (!data.accounts.length) return null;
    return data.accounts[0].id;
  }

  async function loadAccount(id) {
    const res = await fetch(`/account?id=${encodeURIComponent(id)}`);
    if (!res.ok) {
      document.getElementById('profileInfo').innerHTML =
        '<p style="color:#dc2626;">No se encontró esa cuenta.</p>';
      return;
    }
    const acct = await res.json();
    document.getElementById('pUser').textContent    = acct.username;
    document.getElementById('pEmail').textContent    = acct.email   || '—';
    document.getElementById('pPhone').textContent    = acct.phone   || '—';
    document.getElementById('pRole').textContent     = acct.role;
    document.getElementById('pLabel').textContent    = acct.label;
    document.getElementById('pBalance').textContent  = `S/ ${Number(acct.balance).toFixed(2)}`;
    document.getElementById('pId').textContent       = acct.id;
  }

  async function checkSession() {
    const res = await fetch('/api/profile');
    const pre = document.getElementById('sessionResult');
    pre.textContent = JSON.stringify(await res.json(), null, 2);
    pre.classList.add('visible');
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    let id = params.get('id');

    if (!id) {
      id = await resolveMyAccountId();
      if (!id) return;
      // Refleja el id en la URL sin recargar la página
      const newUrl = `${window.location.pathname}?id=${id}`;
      window.history.replaceState({}, '', newUrl);
    }

    loadAccount(id);
  }

  init();
</script>
</body>
</html>
