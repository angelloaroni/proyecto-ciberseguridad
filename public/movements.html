<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falsoniac Bank — Movimientos</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="wrapper">

  <nav class="topbar">
    <a class="brand" href="/dashboard">🏦 Falsoniac Bank</a>
    <div class="nav-links">
      <a href="/dashboard">Inicio</a>
      <a href="/transfer">Transferir</a>
      <a href="/logout">Cerrar sesión</a>
    </div>
  </nav>

  <div class="card">
    <h1 style="margin-bottom:6px;">Historial de movimientos</h1>
    <p style="color:#64748b;font-size:.9rem;margin-bottom:8px;" id="acctLabel">Cargando…</p>
    <p style="color:#64748b;font-size:.85rem;line-height:1.6;margin-bottom:18px;">Esta vista muestra el historial de la cuenta seleccionada para que puedas revisar tus ingresos y egresos.</p>

    <div class="table-wrap">
      <table id="movTable" style="display:none;">
        <thead>
          <tr>
            <th>ID</th>
            <th>Concepto</th>
            <th>Monto</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="movBody"></tbody>
      </table>
    </div>
    <div class="alert" id="alertMsg"></div>
  </div>

</div>
<script>
  // [VULN-IDOR] La cuenta cuyos movimientos se muestran depende únicamente
  // del parámetro ?account_id= en la URL. El servidor no valida ownership,
  // así que cambiar el id en la barra de direcciones expone movimientos
  // de cualquier otra cuenta. Cada fila de la tabla también enlaza a
  // /transaction/:id, que tiene el mismo problema a nivel de transacción.
  async function resolveMyAccountId() {
    const res = await fetch('/user-info');
    if (!res.ok) { window.location.href = '/login'; return null; }
    const data = await res.json();
    if (!data.accounts.length) return null;
    return data.accounts[0].id;
  }

  async function loadMovements(accountId) {
    const res  = await fetch(`/movements?account_id=${encodeURIComponent(accountId)}`);
    const data = await res.json();

    const alertEl = document.getElementById('alertMsg');
    if (!res.ok) {
      alertEl.textContent = data.error;
      alertEl.className   = 'alert alert-error visible';
      document.getElementById('acctLabel').textContent = 'No se pudo cargar la cuenta.';
      return;
    }
    alertEl.className = 'alert';
    document.getElementById('acctLabel').textContent = `Cuenta #${accountId}`;

    const table = document.getElementById('movTable');
    const tbody = document.getElementById('movBody');
    tbody.innerHTML = data.map(t => `
      <tr>
        <td><a href="/transaction/${t.id}" target="_blank">${t.id}</a></td>
        <td>${t.note}</td>
        <td class="${t.amount >= 0 ? 'mov-positive' : 'mov-negative'}">
          ${t.amount >= 0 ? '+' : ''}S/ ${Number(t.amount).toFixed(2)}
        </td>
        <td style="font-size:.8rem;color:#64748b;">${t.created_at || '—'}</td>
      </tr>
    `).join('');
    table.style.display = 'table';
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    let accountId = params.get('account_id');

    if (!accountId) {
      accountId = await resolveMyAccountId();
      if (!accountId) return;
      const newUrl = `${window.location.pathname}?account_id=${accountId}`;
      window.history.replaceState({}, '', newUrl);
    }

    loadMovements(accountId);
  }

  init();
</script>
</body>
</html>
