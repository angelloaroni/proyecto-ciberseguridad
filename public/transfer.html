<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Falsoniac Bank — Transferencia</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="wrapper" style="max-width:600px;">

  <nav class="topbar">
    <a class="brand" href="/dashboard">🏦 Falsoniac Bank</a>
    <div class="nav-links">
      <a href="/dashboard">Inicio</a>
      <a href="/logout">Cerrar sesión</a>
    </div>
  </nav>

  <div class="card">
    <h1 style="margin-bottom:6px;">Nueva transferencia</h1>
    <p style="color:#64748b;font-size:.9rem;margin-bottom:22px;">Envía dinero a otra cuenta de forma rápida y segura.</p>

    <form id="transferForm">

      <!-- [VULN-IDOR] El id de la cuenta de origen se autocompleta con la
           cuenta del usuario en sesión, pero viaja como un input oculto
           que el usuario puede editar desde las DevTools o interceptando
           la petición. El servidor tampoco valida que "from" pertenezca
           al usuario autenticado, así que el IDOR sigue existiendo. -->
      <input type="hidden" name="from" id="fromInput"/>

      <label>
        Cuenta de destino (ID)
        <input type="text" name="to" placeholder="Ej. 3" required/>
      </label>

      <label>
        Monto (S/)
        <!-- [DoS] Sin límite de monto ni rate-limit: enviar miles de
             peticiones simultáneas colapsa el event loop de Node.js. -->
        <input type="number" name="amount" placeholder="0.00" min="0.01" step="0.01" required/>
      </label>

      <label>
        Concepto / nota
        <input type="text" name="note" placeholder="Ej. Pago de alquiler"/>
      </label>

      <button type="submit" class="btn btn-primary btn-full">Enviar transferencia</button>
    </form>

    <div class="alert" id="alertMsg"></div>
  </div>

  <!-- Consulta de cuenta ajena -->
  <div class="card">
    <h2>Consultar cuenta</h2>
    <p style="font-size:.88rem;color:#64748b;margin-bottom:14px;">Verifica el saldo de una cuenta por su ID antes de transferir.</p>

    <form id="accountForm" style="flex-direction:row;align-items:flex-end;gap:10px;display:flex;flex-wrap:wrap;">
      <label style="flex:1;min-width:140px;">
        ID de cuenta
        <input type="text" name="id" placeholder="1, 2, 3…"/>
      </label>
      <button type="submit" class="btn btn-secondary btn-sm" style="align-self:flex-end;">Consultar</button>
    </form>
    <pre class="result-box" id="accountResult"></pre>
  </div>

</div>
<script>
  const alertEl = document.getElementById('alertMsg');

  // Autocompleta la cuenta de origen con la cuenta principal del usuario
  // en sesión (sin pedírsela nunca por UI).
  async function fillMyAccount() {
    const res = await fetch('/user-info');
    if (!res.ok) { window.location.href = '/login'; return; }
    const data = await res.json();
    if (data.accounts.length) {
      document.getElementById('fromInput').value = data.accounts[0].id;
    }
  }
  fillMyAccount();

  document.getElementById('transferForm').addEventListener('submit', async e => {
    e.preventDefault();
    alertEl.className = 'alert';
    const body = {
      from:   e.target.from.value,
      to:     e.target.to.value,
      amount: e.target.amount.value,
      note:   e.target.note.value || 'Transferencia'
    };
    const res  = await fetch('/transfer', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body)
    });
    const data = await res.json();
    alertEl.textContent = data.message || data.error || JSON.stringify(data);
    alertEl.className   = `alert ${res.ok ? 'alert-success' : 'alert-error'} visible`;
  });

  document.getElementById('accountForm').addEventListener('submit', async e => {
    e.preventDefault();
    const id  = e.target.id.value;
    const res = await fetch(`/account?id=${encodeURIComponent(id)}`);
    const pre = document.getElementById('accountResult');
    pre.textContent = JSON.stringify(await res.json(), null, 2);
    pre.classList.add('visible');
  });
</script>
</body>
</html>
